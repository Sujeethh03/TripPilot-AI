# Local dev stack: backend + Postgres (pgvector) + Redis.
# MCP servers run in-process as stdio subprocesses (PROJECT_PLAN §12), so they
# need no separate containers.

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: trippilot
      POSTGRES_PASSWORD: trippilot
      POSTGRES_DB: trippilot
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trippilot"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://trippilot:trippilot@postgres:5432/trippilot
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
