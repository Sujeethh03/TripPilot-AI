name: backend-ci

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"

jobs:
  checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Create venv and install deps
        run: |
          uv venv --python 3.11
          uv pip install -e ".[dev]"

      - name: Lint (ruff)
        run: uv run ruff check

      - name: Type check (mypy strict)
        run: uv run mypy app mcp_servers

      - name: Tests (pytest)
        run: uv run pytest -q
