name: backend-ci

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"

jobs:
  checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: trippilot
          POSTGRES_PASSWORD: trippilot
          POSTGRES_DB: trippilot_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Create venv and install deps
        run: |
          uv venv --python 3.11
          uv pip install -e ".[dev]"

      - name: Lint (ruff)
        run: uv run ruff check

      - name: Type check (mypy strict)
        run: uv run mypy app mcp_servers

      - name: Tests (pytest)
        env:
          TEST_DATABASE_URL: postgresql+asyncpg://trippilot:trippilot@localhost:5432/trippilot_test
        run: uv run pytest -q
